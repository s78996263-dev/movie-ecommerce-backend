<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .form {
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
        }

        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .card {
            background: white;
            padding: 10px;
            border-radius: 10px;
            width: 200px;
        }

        img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
    </style>
</head>

<body>

<h1>Admin Dashboard</h1>

<div class="form">
    <h3>Add Product</h3>
    <input id="name" placeholder="Product Name">
    <input id="price" placeholder="Price" type="number">
    <input id="image" placeholder="Image URL">
    <button onclick="addProduct()">Add</button>
</div>

<h3>Total Products: <span id="count">0</span></h3>

<div class="products" id="productContainer"></div>

<script src="/js/admin.js"></script>

</body>
</html>
