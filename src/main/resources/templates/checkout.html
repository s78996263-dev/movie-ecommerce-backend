<!DOCTYPE html>
<html>
<head>

  <title>Checkout</title>

  <link rel="stylesheet" href="/css/checkout.css">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/all.min.css">

</head>

<body>

<header>

  <div class="logo">
    MoodCart
  </div>

  <div class="checkout-title">
    Checkout
  </div>

</header>

<section class="checkout-section">

  <h2>Your Products</h2>

  <div id="checkoutContainer" class="product-container"></div>

</section>


<section class="payment-section">

  <h2>Payment Method</h2>

  <div class="payment-options">

    <label>
      <input type="radio" name="payment" value="UPI">
      UPI
    </label>

    <label>
      <input type="radio" name="payment" value="CARD">
      Credit Card
    </label>

    <label>
      <input type="radio" name="payment" value="CASH">
      Cash on Delivery
    </label>

  </div>

  <button class="pay-btn" onclick="makePayment()">
    Proceed Payment
  </button>

</section>


<section class="history-section">

  <h2>Payment History</h2>

  <button class="clear-btn" onclick="clearHistory()">
    Clear History
  </button>

  <div id="historyContainer"></div>

</section>

<footer>

  <a href="home.html">Home</a>

  <a href="cart.html">Cart</a>

</footer>

<script src="/js/checkout.js"></script>

</body>
</html>
